<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallAudit Pro — Live Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --surface: #0d1320; --surface2: #111827;
      --border: #1e293b; --text: #e2e8f0; --muted: #64748b;
      --accent: #38bdf8; --green: #22c55e; --red: #f87171;
      --orange: #fb923c; --yellow: #f59e0b;
    }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
    .shell { max-width:1200px; margin:0 auto; padding:24px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid var(--border); margin-bottom:32px; }
    .brand { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
    .brand em { color:var(--accent); font-style:normal; }
    .nav-link { color:var(--muted); text-decoration:none; font-size:13px; padding:6px 12px; border:1px solid var(--border); border-radius:6px; }
    .nav-link:hover { color:var(--accent); border-color:var(--accent); }
    .live-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:20px; background:rgba(248,113,113,0.15); border:1px solid rgba(248,113,113,0.3); color:var(--red); font-size:13px; font-weight:600; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .controls { display:flex; gap:12px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
    .btn { padding:14px 32px; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; cursor:pointer; transition:opacity .2s; }
    .btn-start { background:var(--red); color:#fff; }
    .btn-stop  { background:var(--surface2); color:var(--red); border:1px solid rgba(248,113,113,.3); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .duration { font-family:'DM Mono',monospace; font-size:22px; color:var(--muted); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
    .card-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    .score-big { font-family:'Syne',sans-serif; font-size:56px; font-weight:800; line-height:1; }
    .grade-badge { display:inline-block; padding:6px 20px; border-radius:8px; border:1px solid; font-family:'Syne',sans-serif; font-size:16px; font-weight:800; margin-top:12px; }
    .score-bar-wrap { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin-top:16px; }
    .score-bar { height:100%; border-radius:4px; transition:width 1s ease; background:var(--accent); }
    .transcript-box { height:260px; overflow-y:auto; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:16px; font-family:'DM Mono',monospace; font-size:12px; line-height:1.6; }
    .t-new { color:var(--accent); }
    .t-old { color:var(--muted); }
    .alert-box { max-height:260px; overflow-y:auto; }
    .alert-item { padding:12px 16px; border-radius:8px; margin-bottom:8px; border-left:4px solid; }
    .alert-critical { background:rgba(248,113,113,.1); border-left-color:var(--red); }
    .alert-high     { background:rgba(251,146,60,.1);  border-left-color:var(--orange); }
    .alert-warning  { background:rgba(245,158,11,.1);  border-left-color:var(--yellow); }
    .alert-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
    .alert-msg  { font-size:13px; margin-top:4px; }
    .dim-row { display:flex; align-items:center; gap:12px; padding:6px 0; }
    .dim-label { font-size:12px; color:var(--muted); width:140px; flex-shrink:0; }
    .dim-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .dim-bar { height:100%; border-radius:3px; transition:width 1s ease; }
    .dim-val { font-family:'DM Mono',monospace; font-size:11px; width:40px; text-align:right; }
    .empty-state { color:var(--green); font-size:13px; text-align:center; padding:40px 0; }
    .no-alerts { color:var(--green); font-size:13px; text-align:center; padding:40px 0; }
    .summary-text { font-size:13px; color:#94a3b8; line-height:1.6; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="brand">CallAudit <em>Pro</em> — <em>Live</em></div>
    <div style="display:flex;align-items:center;gap:16px">
      <span class="live-badge" id="liveBadge" style="display:none">
        <span class="live-dot"></span> LIVE
      </span>
      <a href="/" class="nav-link">← Dashboard</a>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="startMonitor()">
      🎤 Start Live Monitor
    </button>
    <button class="btn btn-stop" id="btnStop" onclick="stopMonitor()" disabled>
      ⏹ Stop
    </button>
    <span class="duration" id="durationEl">00:00:00</span>
  </div>

  <!-- Top row -->
  <div class="grid">
    <!-- Live Score -->
    <div class="card">
      <div class="card-title">Live Score</div>
      <div class="score-big" id="scoreVal" style="color:#64748b">—</div>
      <div id="gradeBadge" class="grade-badge" style="display:none"></div>
      <div class="score-bar-wrap">
        <div class="score-bar" id="scoreBar" style="width:0%"></div>
      </div>
      <div style="margin-top:20px">
        <div class="card-title" style="margin-bottom:12px">Dimension Scores</div>
        <div id="dimRows"><div class="empty-state">Waiting for first score...</div></div>
      </div>
    </div>

    <!-- Live Transcript -->
    <div class="card">
      <div class="card-title">Live Transcript</div>
      <div class="transcript-box" id="transcriptBox">
        <div class="empty-state">Waiting for audio...</div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)" id="transcriptMeta"></div>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="grid">
    <!-- Alerts -->
    <div class="card">
      <div class="card-title">
        ⚠ Compliance Alerts
        <span id="alertCount" style="color:var(--red);margin-left:8px"></span>
      </div>
      <div class="alert-box" id="alertBox">
        <div class="no-alerts">No alerts yet ✓</div>
      </div>
    </div>

    <!-- Summary -->
    <div class="card">
      <div class="card-title">AI Summary</div>
      <div class="summary-text" id="summaryText">
        Summary will appear after first scoring cycle (30 seconds)...
      </div>
    </div>
  </div>

</div>

<script>
let timerInterval = null;
let startTime     = null;
let alertCount    = 0;
let pollInterval  = null;

// ── Controls ───────────────────────────────────────
async function startMonitor() {
  document.getElementById("btnStart").disabled = true;
  document.getElementById("btnStop").disabled  = false;
  document.getElementById("liveBadge").style.display = "inline-flex";
  document.getElementById("transcriptBox").innerHTML = '<div class="empty-state">🎤 Listening...</div>';
  document.getElementById("alertBox").innerHTML      = '<div class="no-alerts">No alerts yet ✓</div>';
  alertCount = 0;
  startTime  = Date.now();
  timerInterval = setInterval(updateDuration, 1000);

  await fetch("/live/start", {method:"POST"});

  // Poll status every 3 seconds
  pollInterval = setInterval(pollStatus, 3000);
}

async function stopMonitor() {
  document.getElementById("btnStart").disabled = false;
  document.getElementById("btnStop").disabled  = true;
  document.getElementById("liveBadge").style.display = "none";
  clearInterval(timerInterval);
  clearInterval(pollInterval);

  const res  = await fetch("/live/stop", {method:"POST"});
  const data = await res.json();

  if (data.final_score) {
    updateScore(data.final_score);
  }
}

async function pollStatus() {
  try {
    const res  = await fetch("/live/status");
    const data = await res.json();

    if (data.transcript) {
      updateTranscript(data.transcript);
    }
    if (data.current_score) {
      updateScore(data.current_score);
    }
    if (data.alerts && data.alerts.length > alertCount) {
      const newAlerts = data.alerts.slice(alertCount);
      newAlerts.forEach(addAlert);
    }
  } catch(e) {
    console.error("Poll error:", e);
  }
}

// ── UI Updates ─────────────────────────────────────
function updateDuration() {
  if (!startTime) return;
  const secs = Math.floor((Date.now() - startTime) / 1000);
  const h    = String(Math.floor(secs/3600)).padStart(2,"0");
  const m    = String(Math.floor((secs%3600)/60)).padStart(2,"0");
  const s    = String(secs%60).padStart(2,"0");
  document.getElementById("durationEl").textContent = `${h}:${m}:${s}`;
}

function updateTranscript(fullText) {
  const box   = document.getElementById("transcriptBox");
  const lines = fullText.split("\n").filter(l=>l.trim());
  if (!lines.length) return;
  box.innerHTML = lines.map((l,i) =>
    i === lines.length-1
      ? `<div class="t-new">▶ ${l}</div>`
      : `<div class="t-old">${l}</div>`
  ).join("");
  box.scrollTop = box.scrollHeight;
  document.getElementById("transcriptMeta").textContent =
    `${lines.length} lines transcribed`;
}

function updateScore(data) {
  const score = data.overall_score || data.score || 0;
  const grade = data.grade || "?";
  const color = scoreColor(score);

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = score + "/100";
  scoreEl.style.color = color;

  const barEl = document.getElementById("scoreBar");
  barEl.style.width      = score + "%";
  barEl.style.background = color;

  const gradeEl = document.getElementById("gradeBadge");
  gradeEl.textContent       = "Grade " + grade;
  gradeEl.style.display     = "inline-block";
  gradeEl.style.color       = color;
  gradeEl.style.borderColor = color + "44";
  gradeEl.style.background  = color + "22";

  if (data.summary) {
    document.getElementById("summaryText").textContent = data.summary;
  }

  const dims = data.dimension_scores || data.dimensions || {};
  if (Object.keys(dims).length > 0) {
    renderDimensions(dims);
  }
}

function renderDimensions(dims) {
  const labels = {
    empathy:"Empathy", professionalism:"Professionalism",
    compliance:"Compliance", resolution_effectiveness:"Resolution",
    communication_clarity:"Clarity"
  };
  const html = Object.entries(labels).map(([key, label]) => {
    const val = dims[key] || 0;
    const col = scoreColor(val, 10);
    return `<div class="dim-row">
      <span class="dim-label">${label}</span>
      <div class="dim-bar-wrap">
        <div class="dim-bar" style="width:${val*10}%;background:${col}"></div>
      </div>
      <span class="dim-val" style="color:${col}">${val}/10</span>
    </div>`;
  }).join("");
  document.getElementById("dimRows").innerHTML = html;
}

function addAlert(alert) {
  alertCount++;
  document.getElementById("alertCount").textContent = `(${alertCount})`;
  const level  = (alert.level||"warning").toLowerCase();
  const cls    = level==="critical"?"alert-critical":level==="high"?"alert-high":"alert-warning";
  const box    = document.getElementById("alertBox");
  const placeholder = box.querySelector(".no-alerts");
  if (placeholder) placeholder.remove();
  const item   = document.createElement("div");
  item.className = `alert-item ${cls}`;
  item.innerHTML = `
    <div class="alert-time">${alert.time || new Date().toLocaleTimeString()}</div>
    <div class="alert-msg">${alert.message||""}</div>
  `;
  box.insertBefore(item, box.firstChild);
}

function scoreColor(v, mx=100) {
  const p = v/mx;
  if (p >= 0.75) return "#22c55e";
  if (p >= 0.55) return "#f59e0b";
  return "#f87171";
}
</script>
</body>
</html>
